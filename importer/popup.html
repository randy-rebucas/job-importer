<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalPro Lead Engine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup-root">

      <!-- Header -->
      <header class="popup-header">
        <div class="popup-logo">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10" />
          </svg>
        </div>
        <div class="popup-header-text">
          <span class="popup-title">LocalPro</span>
          <span class="popup-subtitle">Lead Engine</span>
        </div>
        <div id="import-badge" class="import-badge hidden">0</div>
      </header>

      <!-- Loading state -->
      <section id="loading-section" class="section">
        <div class="loading-center">
          <svg class="spinner-lg" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"
              stroke-dasharray="31.4 31.4" />
          </svg>
        </div>
      </section>

      <!-- Logged-out / login state -->
      <section id="auth-section" class="section hidden">
        <p class="section-desc">Sign in to your LocalPro account to start capturing service leads.</p>

        <div class="field">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" type="email" placeholder="you@localpro.asia"
            autocomplete="email" />
        </div>
        <div class="field">
          <label class="label" for="password">Password</label>
          <div class="input-wrap">
            <input class="input" id="password" type="password" placeholder="••••••••"
              autocomplete="current-password" />
            <button id="toggle-password" class="toggle-pw" type="button" aria-label="Show/hide password">
              <svg id="eye-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <div id="auth-error" class="alert alert-error hidden"></div>

        <button id="login-btn" class="btn btn-primary" type="button">
          <span id="login-btn-text">Sign In</span>
          <svg id="login-spinner" class="spinner hidden" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"
              stroke-dasharray="31.4 31.4" />
          </svg>
        </button>
      </section>

      <!-- Logged-in state -->
      <section id="logged-in-section" class="section hidden">

        <!-- User card -->
        <div class="user-card">
          <div class="user-avatar">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <div>
            <div class="user-name" id="user-name">—</div>
            <div class="user-email" id="user-email">—</div>
            <div class="user-role-badge" id="user-role">client</div>
          </div>
        </div>

        <!-- Lead stats -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-num" id="stat-total">—</div>
            <div class="stat-label">Total Leads</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="stat-today">—</div>
            <div class="stat-label">Today</div>
          </div>
        </div>

        <!-- Quick scan button -->
        <button id="scan-btn" class="btn btn-scan" type="button">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
          </svg>
          <span id="scan-btn-text">Scan Current Tab</span>
        </button>
        <button id="scroll-scan-btn" class="btn btn-scroll-scan" type="button">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 13l-7 7-7-7m14-8l-7 7-7-7"/>
          </svg>
          <span id="scroll-scan-btn-text">Scroll & Scan</span>
        </button>

        <div id="scan-error" class="alert alert-error hidden" style="margin-top:8px;"></div>

        <!-- Supported platforms -->
        <div class="platform-badges">
          <span class="platform-badge facebook">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Marketplace
          </span>
          <span class="platform-badge facebook">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Groups
          </span>
          <span class="platform-badge google">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm-0.5 14.5v-5h-3v2.5h.5v2.5h2.5zm5-5h3v5h-3v-5z"/>
            </svg>
            Business
          </span>
          <span class="platform-badge messenger">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c6.627 0 12 5.373 12 12 0 6.628-5.373 12-12 12-2.059 0-3.996-.521-5.674-1.438l-4.236.799.829-4.149C1.521 16.044 1 14.067 1 12 1 5.373 6.373 0 13 0zm.003 8.502c-1.104 0-2 .896-2 2 0 1.104.896 2 2 2 1.105 0 2-.896 2-2 0-1.104-.895-2-2-2zm5.5 0c-1.104 0-2 .896-2 2 0 1.104.896 2 2 2 1.105 0 2-.896 2-2 0-1.104-.895-2-2-2zm-11 0c-1.104 0-2 .896-2 2 0 1.104.896 2 2 2 1.105 0 2-.896 2-2 0-1.104-.895-2-2-2z"/>
            </svg>
            Messenger
          </span>
        </div>

        <!-- Lead history -->
        <div class="history-section">
          <div class="history-header">
            <span class="history-title">Recent Captures</span>
            <button id="clear-history-btn" class="history-clear">Clear</button>
          </div>
          <div id="history-list" class="history-list">
            <div class="history-empty">No captured leads yet.</div>
          </div>
        </div>

        <button id="logout-btn" class="btn btn-danger" type="button">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Sign Out
        </button>
      </section>

      <footer class="popup-footer">
        <a href="https://localpro.asia" target="_blank" rel="noopener">localpro.asia</a>
        <span class="version">v1.1.0</span>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
